name: cleanr
profile: startup
targets:
  - name: repository
    path: .
    language: go
    entrypoints:
      - cmd/cleanr
      - cmd/cleanr-dev
checks:
  quality: true
  design: false
  security: true
  prompts: false
  ci: true
  quality_rules:
    max_file_lines: 400
    max_function_lines: 80
    max_parameters: 5
    max_cyclomatic_complexity: 20
  ci_rules:
    require_workflow_dir: true
    required_workflow_files:
      - .github/workflows/ci.yml
      - .github/workflows/cd.yml
      - .github/workflows/release.yml
    required_release_files:
      - .goreleaser.yaml
      - Dockerfile.release
      - .github/release-please-config.json
      - .release-please-manifest.json
      - CHANGELOG.md
    required_automation_paths:
      - Makefile
      - scripts/commit.sh
  security_rules:
    govulncheck_mode: auto
    govulncheck_command: govulncheck
exclude:
  - vendor/**
  - "**/testdata/**"
  - dist/**
  - .gocache/**
baseline:
  path: codeguard-baseline.json
cache:
  enabled: true
  path: .codeguard/cache.json
output:
  format: text
