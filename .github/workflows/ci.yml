name: ci.yml

on:
  pull_request:
    branches:
      - develop
      - master
      - main

permissions:
  contents: read
  pull-requests: read

env:
  GOCACHE: ${{ github.workspace }}/.gocache
  GO111MODULE: "on"
  GOVULNCHECK_MODE: required
  GOVULNCHECK_VERSION: v1.3.0
  GOCYCLO_VERSION: v0.6.0
  MIN_INTERNAL_COVERAGE: "65.0"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-test-presence:
    name: test presence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 50

      - name: Check changed code paths have test coverage updates
        shell: bash
        env:
          PR_BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          git fetch origin "${PR_BASE_REF}" --depth=1 || true
          base_ref="origin/${PR_BASE_REF}"
          changed_files="$(git diff --name-only "${base_ref}"...HEAD)"

          code_changes="$(printf '%s\n' "$changed_files" | grep -E '^(cleanr/|cmd/|internal/).+\.go$' | grep -Ev '(^|/).+_test\.go$|(^|/)doc\.go$' || true)"
          test_changes="$(printf '%s\n' "$changed_files" | grep -E '(^tests/|_test\.go$)' || true)"

          if [ -z "$code_changes" ]; then
            echo "No Go source changes that require a test presence check."
            exit 0
          fi

          echo "Go source files changed:"
          printf '%s\n' "$code_changes"

          if [ -n "$test_changes" ]; then
            echo
            echo "Matching test updates detected:"
            printf '%s\n' "$test_changes"
            exit 0
          fi

          echo "::error title=Missing test update::Go source changed without any updates under tests/ or *_test.go files"
          exit 1

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail
          make fmt
          git diff --exit-code

  vet:
    name: vet
    needs:
      - check-test-presence
      - fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run go vet
        run: go vet ./...

  gocyclo:
    name: gocyclo
    needs: vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gocyclo
        run: go install github.com/fzipp/gocyclo/cmd/gocyclo@${{ env.GOCYCLO_VERSION }}

      - name: Enforce cyclomatic complexity budget
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t files < <(find cleanr cmd internal -type f -name '*.go' ! -name '*_test.go' | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No non-test Go files found."
            exit 0
          fi

          gocyclo_bin="$(go env GOPATH)/bin/gocyclo"
          "$gocyclo_bin" -over 20 "${files[@]}" | tee gocyclo.out

          {
            echo "## Cyclomatic Complexity"
            echo
            if [ -s gocyclo.out ]; then
              echo "Functions above the limit:"
              echo '```'
              sed -n '1,80p' gocyclo.out
              echo '```'
            else
              echo "No functions exceeded the \`gocyclo\` limit of 20."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -s gocyclo.out ]; then
            echo "::error title=High cyclomatic complexity::gocyclo found functions above the limit"
            exit 1
          fi

  test:
    name: test (${{ matrix.label }})
    needs:
      - vet
      - gocyclo
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: ubuntu-latest full
          - os: macos-latest
            label: macos-latest full
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run test suite
        run: go test ./...

  build:
    name: build
    needs:
      - vet
      - gocyclo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build snapshot binary
        run: go build -trimpath -o ./dist/cleanr ./cmd/cleanr

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: cleanr-linux-amd64-snapshot
          path: dist/cleanr

  coverage:
    name: coverage
    needs:
      - vet
      - gocyclo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Enforce internal coverage gate
        shell: bash
        run: |
          set -euo pipefail

          go test ./... -coverpkg=./internal/... -coverprofile=.coverage.internal.out
          total="$(go tool cover -func=.coverage.internal.out | awk '/^total:/ {gsub(/%/, "", $3); print $3}')"

          {
            echo "## Coverage"
            echo
            echo "Total internal coverage: ${total}%"
            echo "Required minimum: ${MIN_INTERNAL_COVERAGE}%"
          } >> "$GITHUB_STEP_SUMMARY"

          awk -v total="$total" -v min="$MIN_INTERNAL_COVERAGE" 'BEGIN { exit !(total + 0 >= min + 0) }'

  security:
    name: security scan
    needs:
      - vet
      - gocyclo
    runs-on: ubuntu-latest
    env:
      PR_BASE_REF: ${{ github.base_ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Fetch base branch
        run: git fetch origin "${PR_BASE_REF}" --depth=1

      - name: Install govulncheck
        shell: bash
        run: |
          set -euo pipefail

          if go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}; then
            exit 0
          fi

          if [ "${GOVULNCHECK_MODE}" = "required" ]; then
            echo "::error title=govulncheck install failed::Failed to install govulncheck@${GOVULNCHECK_VERSION}"
            exit 1
          fi

          echo "::warning::Failed to install govulncheck@${GOVULNCHECK_VERSION}; continuing because GOVULNCHECK_MODE=${GOVULNCHECK_MODE}"

      - name: Dependency and code vulnerability scan
        shell: bash
        run: |
          set -euo pipefail

          echo "## Security Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "### govulncheck" >> "$GITHUB_STEP_SUMMARY"

          if [ "${GOVULNCHECK_MODE}" = "off" ]; then
            echo "Skipped because GOVULNCHECK_MODE=off." >> "$GITHUB_STEP_SUMMARY"
          elif [ ! -x "$(go env GOPATH)/bin/govulncheck" ]; then
            echo "::warning::govulncheck binary is unavailable"
            echo "Skipped because govulncheck could not be installed for this Go toolchain." >> "$GITHUB_STEP_SUMMARY"
          elif "$(go env GOPATH)/bin/govulncheck" ./... 2>&1 | tee govulncheck.log; then
            echo "No known Go vulnerabilities detected." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::govulncheck reported findings"
            echo "Potential vulnerabilities detected:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            sed -n '1,80p' govulncheck.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          echo >> "$GITHUB_STEP_SUMMARY"

      - name: Critical files check
        shell: bash
        run: |
          set -euo pipefail

          echo "### Critical Files Modified" >> "$GITHUB_STEP_SUMMARY"
          critical="$(git diff --name-only "origin/${PR_BASE_REF}"...HEAD | grep -E '^(cmd/cleanr/|cmd/cleanr-dev/|cleanr/|internal/cli/|internal/devtools/|internal/mcpserver/|go\.mod|go\.sum|Formula/|\.goreleaser\.yaml|\.github/workflows/.*\.yml|\.github/release-please-config\.json|\.release-please-manifest\.json)' || true)"

          if [ -n "$critical" ]; then
            echo "**HIGH RISK**: critical files were modified:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            printf '%s\n' "$critical" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "**Required Actions:**" >> "$GITHUB_STEP_SUMMARY"
            echo "- [ ] Manual review of command execution and release paths" >> "$GITHUB_STEP_SUMMARY"
            echo "- [ ] Verify install and packaging behavior remains intentional" >> "$GITHUB_STEP_SUMMARY"
            echo "- [ ] Confirm workflow or dependency changes are expected" >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Critical cleanr files modified"
          else
            echo "No critical files modified." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo >> "$GITHUB_STEP_SUMMARY"

      - name: Dangerous patterns scan
        shell: bash
        run: |
          set -euo pipefail

          echo "### Dangerous Code Patterns" >> "$GITHUB_STEP_SUMMARY"
          patterns="$(git diff "origin/${PR_BASE_REF}"...HEAD | grep -E '^\+.*(exec\.Command(Context)?\(|http\.(Get|Post)\(|net\.Dial\(|os\.RemoveAll\(|os\.Setenv\(|syscall\.|unsafe \{|panic!\(|TODO|FIXME)' || true)"

          if [ -n "$patterns" ]; then
            echo "**Potentially sensitive additions detected:**" >> "$GITHUB_STEP_SUMMARY"
            echo '```diff' >> "$GITHUB_STEP_SUMMARY"
            printf '%s\n' "$patterns" | sed -n '1,40p' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "**Review Focus:**" >> "$GITHUB_STEP_SUMMARY"
            printf '%s\n' "$patterns" | grep -q 'exec\.Command' && echo "- Command execution paths changed" >> "$GITHUB_STEP_SUMMARY" || true
            printf '%s\n' "$patterns" | grep -q 'http\.\|net\.Dial' && echo "- Network behavior changed" >> "$GITHUB_STEP_SUMMARY" || true
            printf '%s\n' "$patterns" | grep -q 'os\.Setenv\|syscall\.' && echo "- Process or environment mutation changed" >> "$GITHUB_STEP_SUMMARY" || true
            printf '%s\n' "$patterns" | grep -q 'unsafe' && echo "- Unsafe code blocks changed" >> "$GITHUB_STEP_SUMMARY" || true
            echo "::warning::Potentially dangerous patterns detected"
          else
            echo "No dangerous patterns detected." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo >> "$GITHUB_STEP_SUMMARY"

      - name: New dependencies check
        shell: bash
        run: |
          set -euo pipefail

          echo "### Dependency Changes" >> "$GITHUB_STEP_SUMMARY"

          if git diff "origin/${PR_BASE_REF}"...HEAD -- go.mod | grep -E '^\+[^+]' > go_mod_additions.txt; then
            echo "**go.mod additions:**" >> "$GITHUB_STEP_SUMMARY"
            echo '```diff' >> "$GITHUB_STEP_SUMMARY"
            sed -n '1,80p' go_mod_additions.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "**Required Actions:**" >> "$GITHUB_STEP_SUMMARY"
            echo "- [ ] Audit each new module and version" >> "$GITHUB_STEP_SUMMARY"
            echo "- [ ] Verify new indirect dependencies are expected" >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Dependency manifest changed"
          else
            echo "No go.mod additions detected." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo >> "$GITHUB_STEP_SUMMARY"

      - name: Summary verdict
        shell: bash
        run: |
          {
            echo "---"
            echo
            echo "### Security Review Verdict"
            echo
            echo "This is an automated scan. A human maintainer still needs to:"
            echo "1. Review warnings above"
            echo "2. Confirm PR intent matches the actual diff"
            echo "3. Check release, install, and command execution paths for abuse"
          } >> "$GITHUB_STEP_SUMMARY"

  semgrep:
    name: semgrep security scan
    needs:
      - vet
      - gocyclo
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Semgrep
        run: semgrep scan --config auto --baseline-commit "${{ github.event.pull_request.base.sha }}" --error

  doc-review:
    name: doc review
    if: github.base_ref == 'develop'
    needs:
      - vet
      - gocyclo
    runs-on: ubuntu-latest
    env:
      PR_BASE_REF: ${{ github.base_ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${PR_BASE_REF}" --depth=1

      - name: Check doc-sensitive changes have doc updates
        shell: bash
        run: |
          set -euo pipefail

          changed="$(git diff --name-only "origin/${PR_BASE_REF}"...HEAD)"
          ci_cd_only="$(printf '%s\n' "$changed" | grep -E '^(\.github/workflows/|\.github/release-please-config\.json$|\.release-please-manifest\.json$)' || true)"
          doc_sensitive="$(printf '%s\n' "$changed" | grep -E '^(\.goreleaser\.yaml$|\.github/release-please-config\.json$|\.release-please-manifest\.json$|Formula/|README\.md$|docs/|internal/devtools/)' || true)"
          docs_changed="$(printf '%s\n' "$changed" | grep -E '^(README\.md|CONTRIBUTING\.md|docs/)' || true)"

          echo "## Documentation Review" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"

          if [ -z "$doc_sensitive" ]; then
            if [ -n "$ci_cd_only" ]; then
              echo "Only CI/CD automation files changed. Documentation updates are not required for this PR." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "No install or release changes that require documentation review." >> "$GITHUB_STEP_SUMMARY"
            fi
            exit 0
          fi

          echo "Doc-sensitive files changed:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' "$doc_sensitive" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$docs_changed" ]; then
            echo "Relevant documentation files were updated:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            printf '%s\n' "$docs_changed" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "::error::Install or release changes require updates in README.md, CONTRIBUTING.md, or docs/"
          exit 1

  dco:
    name: dco
    if: github.base_ref == 'develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by trailers
        shell: bash
        run: |
          set -euo pipefail

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          missing=0

          while IFS= read -r commit; do
            [ -n "$commit" ] || continue

            if ! git show -s --format=%B "$commit" | grep -qi '^Signed-off-by:'; then
              echo "::error title=DCO check failed::commit $commit is missing a Signed-off-by trailer"
              missing=1
            fi
          done < <(git rev-list "${base_sha}..${head_sha}")

          exit "$missing"
