name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version to package
        required: true
        default: v0.0.0-dev

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package release artifacts
        run: make release VERSION=${{ steps.version.outputs.value }}

      - name: Compute Homebrew source tarball SHA256
        id: homebrew
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          SOURCE_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${VERSION}.tar.gz"
          curl -fsSL "$SOURCE_URL" -o /tmp/cleanr-homebrew-source.tar.gz
          echo "source_sha256=$(sha256sum /tmp/cleanr-homebrew-source.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Generate Homebrew formula
        run: make homebrew-formula VERSION=${{ steps.version.outputs.value }} REPOSITORY=${{ github.repository }} SOURCE_SHA256=${{ steps.homebrew.outputs.source_sha256 }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          files: dist/releases/${{ steps.version.outputs.value }}/*
